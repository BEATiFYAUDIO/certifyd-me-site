<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="icon" type="image/png" href="screenshots/tab-icon.png?v=20260402b" />
  <link rel="shortcut icon" type="image/png" href="screenshots/tab-icon.png?v=20260402b" />
  <link rel="apple-touch-icon" href="screenshots/tab-icon.png?v=20260402b" />
  <title>Certifyd Network | Creator Examples</title>
  <meta name="description" content="Explore live Certifyd creator examples." />
  <style>
    :root{
      --bg:#080a0d;
      --text:#e8ecf1;
      --muted:#8a95a3;
      --border:#232b35;
      --border2:#3a4554;
      --panel:rgba(15,19,24,0.86);
      --brand:#c6a65a;
      --brand-hover:#d2b56f;
      --wrap:980px;
      --pad:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--text);
      background:
        linear-gradient(180deg, rgba(8,10,13,0.84), rgba(8,10,13,0.9)),
        radial-gradient(1000px 620px at 14% -12%, rgba(95,137,198,0.10), transparent 58%),
        radial-gradient(900px 560px at 88% 10%, rgba(198,166,90,0.12), transparent 58%),
        url("images/certifyd-bg.png") center/cover no-repeat fixed,
        var(--bg);
      line-height:1.6;
      overflow-x:hidden;
    }
    a{color:inherit;text-decoration:none}
    .wrap{max-width:var(--wrap);margin:0 auto;padding:0 var(--pad)}
    header{padding:20px 0;border-bottom:1px solid var(--border);backdrop-filter:blur(12px);background:rgba(8,10,13,0.84);position:sticky;top:0}
    .row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;font-weight:700}
    .brand img{height:68px;width:auto;display:block}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:10px 14px;border-radius:14px;border:1px solid var(--border2);background:#1a212a;font-weight:700}
    .btn.primary{background:var(--brand);color:#111418;border-color:transparent}
    .btn.primary:hover{background:var(--brand-hover)}
    main{padding:50px 0 60px}
    h1{margin:0 0 10px;font-size:clamp(1.9rem,5.2vw,3rem);line-height:1.1;letter-spacing:-0.02em}
    p{margin:0;color:var(--muted)}
    .grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-top:26px}
    .card{border:1px solid var(--border);border-radius:18px;background:var(--panel);padding:20px;box-shadow:0 22px 70px rgba(0,0,0,0.22)}
    .card h2{margin:0 0 8px;font-size:1.2rem}
    .actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}
    footer{padding:16px 0 28px;border-top:1px solid var(--border);color:var(--muted);font-size:.92rem}
    @media (max-width:640px){
      :root{--pad:16px}
      .brand img{height:58px}
      main{padding:34px 0 42px}
      .btn{width:100%}
      .actions{flex-direction:column;align-items:stretch}
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap row">
      <a class="brand" href="./index.html">
        <img src="screenshots/logo-lockup.png" alt="Certifyd Creator logo" />
      </a>
      <a class="btn" href="./index.html">Back to Certifyd</a>
    </div>
  </header>

  <main>
    <div class="wrap">
      <h1>Live creator examples</h1>
      <p>Two real creator pages currently running on Certifyd infrastructure.</p>

      <div class="grid">
        <article class="card">
          <h2>Blessedrthe</h2>
          <p>Public creator profile and release surfaces.</p>
          <div class="actions">
            <a class="btn primary" href="https://certifyd.darrylhillock.com/u/blessedrthe" target="_blank" rel="noopener noreferrer">Open profile</a>
          </div>
        </article>

        <article class="card">
          <h2>Inklinguy</h2>
          <p>Sovereign-domain creator page on canonical host.</p>
          <div class="actions">
            <a class="btn primary" href="https://inklinguy.pro/" target="_blank" rel="noopener noreferrer">Open site</a>
          </div>
        </article>
      </div>
    </div>
  </main>

  <footer>
    <div class="wrap">Certifyd · Built by Beatify Group</div>
  </footer>
</body>
</html>
